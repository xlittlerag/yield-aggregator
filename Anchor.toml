[toolchain]
anchor_version = "1.0.2"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
yield_aggregator = "2jXAhzR4BTm9kXXt6U77zUehpvgEX5gR4KV9uY5D68AH"

[provider]
cluster = "localnet"
wallet = "./test-wallet.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false
